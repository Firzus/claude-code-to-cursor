services:
  api:
    build: .
    container_name: cctc-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8082}:8082"
    volumes:
      - cctc-data:/data
    env_file: .env
    environment:
      - CCTC_DB_PATH=/data/cctc.db
      - CCTC_AUTH_DIR=/data/auth
      - LOG_DIR=/data/logs
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8082/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    build: ./frontend
    container_name: cctc-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3111}:3111"
    environment:
      - API_URL=http://api:8082
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3111/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  cloudflared:
    image: cloudflare/cloudflared:2025.4.0
    container_name: cctc-cloudflared
    restart: unless-stopped
    command: tunnel --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

networks:
  internal:
    driver: bridge

volumes:
  cctc-data:
