# Development overrides. Loads docker-compose.yml via Compose "include".
# Run: docker compose -f docker-compose.dev.yml up
include:
  - path: docker-compose.yml

services:
  api:
    volumes:
      - .:/app
      - /app/node_modules
      - cctc-data:/data
    command: bun --hot run index.ts

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3111:3111"
    command: npx vite dev --host --port 3111
    environment:
      - API_URL=http://api:8082
